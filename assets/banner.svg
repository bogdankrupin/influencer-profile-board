<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="Influencer Profile Board — a Claude Agent Skill">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F1B33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#21D4C4"/>
      <stop offset="1" stop-color="#2747FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152038"/>
      <stop offset="1" stop-color="#101A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#2747FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2747FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#glow)"/>

  <!-- left: text -->
  <g transform="translate(72,108)">
    <text x="0" y="0" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="15" letter-spacing="4" fill="#21D4C4">A CLAUDE AGENT SKILL</text>
    <text x="-2" y="74" font-family="'Space Grotesk', system-ui, sans-serif" font-size="64" font-weight="700" fill="#F4F7FB">Influencer</text>
    <text x="-2" y="142" font-family="'Space Grotesk', system-ui, sans-serif" font-size="64" font-weight="700" fill="#F4F7FB">Profile Board</text>
    <text x="0" y="192" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#9FB0C7">Turn anyone's public footprint into one interactive,</text>
    <text x="0" y="220" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#9FB0C7">sourced board — built from web search.</text>
    <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="13" fill="#7E90AB">
      <rect x="0" y="244" width="118" height="30" rx="15" fill="none" stroke="#26344F"/>
      <text x="16" y="264">web search</text>
      <rect x="130" y="244" width="104" height="30" rx="15" fill="none" stroke="#26344F"/>
      <text x="146" y="264">sourced</text>
      <rect x="246" y="244" width="150" height="30" rx="15" fill="none" stroke="#26344F"/>
      <text x="262" y="264">single-file HTML</text>
    </g>
  </g>

  <!-- right: stylized profile board card -->
  <g transform="translate(842,70)">
    <rect x="0" y="0" width="366" height="300" rx="20" fill="url(#card)" stroke="#26344F"/>
    <!-- avatar + name -->
    <circle cx="52" cy="56" r="26" fill="#1C2C49" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="52" cy="48" r="9" fill="#3B4E72"/>
    <path d="M36 70 a16 14 0 0 1 32 0 z" fill="#3B4E72"/>
    <rect x="92" y="40" width="150" height="14" rx="7" fill="#E4EAF5"/>
    <rect x="92" y="62" width="104" height="10" rx="5" fill="#5E719A"/>
    <!-- topic chips -->
    <rect x="28" y="104" width="74" height="22" rx="11" fill="#16243E" stroke="#2A3A58"/>
    <rect x="110" y="104" width="92" height="22" rx="11" fill="#16243E" stroke="#2A3A58"/>
    <rect x="210" y="104" width="64" height="22" rx="11" fill="#1B2B49" stroke="url(#accent)"/>
    <!-- scored bars -->
    <g>
      <rect x="28" y="150" width="310" height="8" rx="4" fill="#1B2740"/>
      <rect x="28" y="150" width="250" height="8" rx="4" fill="url(#accent)"/>
      <rect x="28" y="178" width="310" height="8" rx="4" fill="#1B2740"/>
      <rect x="28" y="178" width="196" height="8" rx="4" fill="url(#accent)"/>
      <rect x="28" y="206" width="310" height="8" rx="4" fill="#1B2740"/>
      <rect x="28" y="206" width="278" height="8" rx="4" fill="url(#accent)"/>
      <rect x="28" y="234" width="310" height="8" rx="4" fill="#1B2740"/>
      <rect x="28" y="234" width="120" height="8" rx="4" fill="#21D4C4"/>
    </g>
    <!-- source dots -->
    <circle cx="32" cy="270" r="4" fill="#21D4C4"/>
    <rect x="44" y="266" width="120" height="8" rx="4" fill="#243650"/>
    <circle cx="182" cy="270" r="4" fill="#2747FF"/>
    <rect x="194" y="266" width="96" height="8" rx="4" fill="#243650"/>
  </g>
</svg>
